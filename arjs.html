<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>AR.js — Marker-Based Demo</title>

    <!-- Import map: Three.js bare specifier used by arjs-plugin-threejs -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.182.0/build/three.module.js"
        }
      }
    </script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        background: #0a0a0a;
      }

      /* Full-screen AR viewport */
      #viewport {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background: #000;
        overflow: hidden;
      }

      #viewport video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
      }

      #viewport canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
        pointer-events: none;
      }

      /* Navigation overlay */
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: calc(0.75rem + env(safe-area-inset-top))
          calc(1rem + env(safe-area-inset-right)) 0.75rem
          calc(1rem + env(safe-area-inset-left));
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        color: white;
      }

      .overlay a {
        color: white;
        text-decoration: none;
        font-size: 0.875rem;
        padding: 0.5rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 0.375rem;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
      }

      .overlay a:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .overlay h1 {
        font-size: 1rem;
        font-weight: 600;
        margin: 0;
        max-width: 60vw;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Status pill */
      .status-pill {
        position: fixed;
        top: calc(4rem + env(safe-area-inset-top));
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        padding: 0.5rem 1rem;
        border-radius: 2rem;
        font-size: 0.8125rem;
        font-weight: 500;
        color: white;
        background: rgba(17, 17, 17, 0.85);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        transition: opacity 0.3s, background 0.3s;
        text-align: center;
        max-width: 80vw;
      }

      .status-pill.ready {
        background: rgba(0, 212, 200, 0.25);
        color: #00d4c8;
      }

      .status-pill.error {
        background: rgba(255, 77, 61, 0.25);
        color: #ff4d3d;
      }

      .status-pill.hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* Instructions bar */
      .instructions {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 10;
        padding: 1rem calc(1rem + env(safe-area-inset-right))
          calc(1rem + env(safe-area-inset-bottom))
          calc(1rem + env(safe-area-inset-left));
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        color: white;
        text-align: center;
        font-size: 0.875rem;
        line-height: 1.5;
      }

      .instructions a {
        color: #00d4c8;
      }
    </style>
  </head>

  <body>
    <!-- Navigation overlay -->
    <div class="overlay">
      <a href="./">← Back</a>
      <h1>AR.js — Marker Tracking</h1>
    </div>

    <!-- Status pill -->
    <div id="status" class="status-pill">Initializing…</div>

    <!-- Full-screen AR viewport (video + Three.js canvas injected here) -->
    <div id="viewport"></div>

    <!-- Instructions -->
    <div class="instructions">
      Point your camera at a
      <a
        href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png"
        target="_blank"
        rel="noopener noreferrer"
      >
        Hiro marker
      </a>
      to see a 3D box. Requires HTTPS or localhost.
    </div>


    <!--
      Cross-origin Worker shim: browsers block new Worker() with CDN URLs.
      This patches the Worker constructor to wrap cross-origin module workers
      in a same-origin blob that imports the real script, preserving relative
      imports inside the worker.
    -->
    <script>
      (function () {
        const NativeWorker = window.Worker;
        window.Worker = function (url, options) {
          const urlStr = url instanceof URL ? url.href : String(url);
          const isCrossOrigin =
            urlStr.startsWith("http") &&
            !urlStr.startsWith(location.origin);
          const isModule = options && options.type === "module";

          if (isCrossOrigin && isModule) {
            const blob = new Blob(
              ['import "' + urlStr + '";'],
              { type: "text/javascript" }
            );
            const blobUrl = URL.createObjectURL(blob);
            return new NativeWorker(blobUrl, options);
          }

          return new NativeWorker(url, options);
        };
        window.Worker.prototype = NativeWorker.prototype;
      })();
    </script>

    <script type="module">
      // --- CDN Imports ---
      import {
        Engine,
        CaptureSystem,
        FramePumpSystem,
        SOURCE_TYPES,
        webcamPlugin,
        defaultProfilePlugin,
      } from "https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js-next@0.2.0/dist/arjs-core.mjs";

      import * as THREE from "https://unpkg.com/three@0.182.0/build/three.module.js";

      // --- DOM refs ---
      const statusEl = document.getElementById("status");
      const viewport = document.getElementById("viewport");

      // --- Data file URLs (served from public/) ---
      const cameraParamsUrl = new URL(
        /* @vite-ignore */ "./vendor/arjs-next/data/camera_para.dat",
        import.meta.url
      ).href;
      const hiroUrl = new URL(
        /* @vite-ignore */ "./vendor/arjs-next/data/patt.hiro",
        import.meta.url
      ).href;

      // --- Status helpers ---
      function setStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status-pill";
        if (type === "ready") statusEl.classList.add("ready");
        if (type === "error") statusEl.classList.add("error");
      }

      function hideStatus() {
        statusEl.classList.add("hidden");
      }

      // --- Move webcam video into our viewport container ---
      function attachVideoToViewport(ctx) {
        const frameSource = CaptureSystem.getFrameSource(ctx);
        const videoEl = frameSource?.element;
        if (!videoEl || !viewport) return;

        try {
          if (videoEl.parentNode && videoEl.parentNode !== viewport) {
            videoEl.parentNode.removeChild(videoEl);
          }
        } catch {
          /* ignore */
        }

        videoEl.setAttribute("playsinline", "");
        videoEl.setAttribute("autoplay", "");
        videoEl.muted = true;
        videoEl.controls = false;

        Object.assign(videoEl.style, {
          position: "absolute",
          inset: "0",
          width: "100%",
          height: "100%",
          objectFit: "cover",
          zIndex: "1",
          display: "block",
        });

        if (!viewport.contains(videoEl)) {
          viewport.appendChild(videoEl);
        }
      }

      // --- Cube rotation animation ---
      function animateCube(cube) {
        const speed = (2 * Math.PI) / 4; // one full rotation in 4 seconds
        let lastTime = performance.now();

        function tick(now) {
          const dt = (now - lastTime) / 1000;
          lastTime = now;
          cube.rotation.y += speed * dt;
          requestAnimationFrame(tick);
        }

        requestAnimationFrame(tick);
      }

      // --- Main bootstrap (auto-start, no buttons) ---
      async function bootstrap() {
        try {
          // 1. Create engine + register core plugins
          const engine = new Engine();
          engine.pluginManager.register(
            defaultProfilePlugin.id,
            defaultProfilePlugin
          );
          engine.pluginManager.register(webcamPlugin.id, webcamPlugin);

          // 2. Dynamic-import tracking + renderer plugins from CDN
          const [artoolkitMod, threeMod] = await Promise.all([
            import(
              "https://cdn.jsdelivr.net/npm/@ar-js-org/arjs-plugin-artoolkit@0.1.3/dist/arjs-plugin-artoolkit.es.js"
            ),
            import(
              "https://cdn.jsdelivr.net/npm/@ar-js-org/arjs-plugin-threejs@0.1.1/dist/arjs-plugin-threejs.mjs"
            ),
          ]);

          const ArtoolkitPlugin =
            artoolkitMod.ArtoolkitPlugin || artoolkitMod.default;
          const ThreeJSRendererPlugin =
            threeMod.ThreeJSRendererPlugin || threeMod.default;

          setStatus("Loading AR engine…");

          // 3. Enable core plugins
          const ctx = engine.getContext();
          await engine.pluginManager.enable(defaultProfilePlugin.id, ctx);
          await engine.pluginManager.enable(webcamPlugin.id, ctx);

          // 4. Init ARToolKit plugin
          const artoolkit = new ArtoolkitPlugin({
            cameraParametersUrl: cameraParamsUrl,
            minConfidence: 0.6,
          });

          try {
            await artoolkit.init(ctx);
            await artoolkit.enable();
          } catch (e) {
            console.error("[ArtoolkitPlugin] init/enable failed:", e);
            setStatus("AR engine failed to load", "error");
            return;
          }

          // 5. Init Three.js renderer plugin
          const threePlugin = new ThreeJSRendererPlugin({
            container: viewport,
            alpha: true,
            antialias: true,
            preserveDrawingBuffer: false,
            useLegacyAxisChain: true,
            changeMatrixMode: "modelViewMatrix",
            preferRAF: true,
          });
          await threePlugin.init(engine);
          await threePlugin.enable();

          // Force Three.js canvas to fill viewport
          const renderer = threePlugin.getRenderer();
          if (renderer) {
            Object.assign(renderer.domElement.style, {
              position: "absolute",
              inset: "0",
              width: "100%",
              height: "100%",
            });
          }

          // Adjust camera clipping
          const cam = threePlugin.getCamera();
          cam.near = 0.01;
          cam.far = 5000;
          cam.updateProjectionMatrix();

          // 6. Event bus — bridge ar:getMarker → content + ar:marker
          const bus = engine.eventBus;

          bus.on("ar:getMarker", (d) => {
            const id = String(
              d?.marker?.markerId ??
                d?.marker?.id ??
                d?.marker?.pattHandle ??
                d?.marker?.uid ??
                d?.marker?.index ??
                "0"
            );

            // Add cube to anchor on first detection
            setTimeout(() => {
              const anchor = threePlugin.getAnchor(id);
              if (anchor && !anchor.userData._content) {
                anchor.userData._content = true;

                const cube = new THREE.Mesh(
                  new THREE.BoxGeometry(0.5, 0.5, 0.5),
                  new THREE.MeshNormalMaterial({
                    opacity: 0.85,
                    transparent: true,
                  })
                );
                cube.position.y = 0.25;
                anchor.add(cube);
                animateCube(cube);

                // Hide status once content is visible
                hideStatus();
              }
            }, 0);

            // Bridge to unified ar:marker for ThreeJSRendererPlugin
            const matrix = d?.matrix;
            if (Array.isArray(matrix) && matrix.length === 16) {
              bus.emit("ar:marker", {
                id,
                matrix,
                visible: true,
                source: "bridge:getMarker",
              });
            }
          });

          // Bridge legacy marker events
          bus.on("ar:markerFound", (d) => {
            bus.emit("ar:marker", {
              id: d?.markerId ?? d?.id,
              matrix: d?.matrix ?? d?.transformationMatrix,
              visible: true,
            });
          });
          bus.on("ar:markerUpdated", (d) => {
            bus.emit("ar:marker", {
              id: d?.markerId ?? d?.id,
              matrix: d?.matrix ?? d?.transformationMatrix,
              visible: true,
            });
          });
          bus.on("ar:markerLost", (d) => {
            bus.emit("ar:marker", {
              id: d?.markerId ?? d?.id,
              visible: false,
            });
          });

          // 7. Start ECS engine
          engine.start();

          // 8. Wait for worker ready, then start webcam + load marker
          const workerReady =
            artoolkit.workerReady ||
            (await new Promise((resolve) => {
              const timeout = setTimeout(() => resolve(false), 10000);
              bus.on("ar:workerReady", () => {
                clearTimeout(timeout);
                resolve(true);
              });
            }));

          if (!workerReady) {
            setStatus("AR worker timed out", "error");
            return;
          }

          // Emit camera projection matrix if available
          try {
            const proj = artoolkit.getProjectionMatrix?.();
            const arr = proj?.toArray ? proj.toArray() : proj;
            if (Array.isArray(arr) && arr.length === 16) {
              bus.emit("ar:camera", { projectionMatrix: arr });
            }
          } catch {
            /* ignore */
          }

          setStatus("Starting camera…");

          // 9. Start webcam
          await CaptureSystem.initialize(
            {
              sourceType: SOURCE_TYPES.WEBCAM,
              sourceWidth: 640,
              sourceHeight: 480,
            },
            ctx
          );

          attachVideoToViewport(ctx);
          FramePumpSystem.start(ctx);

          // 10. Load Hiro marker
          setStatus("Loading marker…");
          await artoolkit.loadMarker(hiroUrl, 1);

          setStatus("Ready — show the Hiro marker", "ready");

          // Auto-hide status after 4 seconds
          setTimeout(hideStatus, 4000);
        } catch (err) {
          console.error("[AR.js-next] bootstrap error:", err);
          setStatus(
            "Failed to start: " + (err?.message || "Unknown error"),
            "error"
          );
        }
      }

      bootstrap();
    </script>
  </body>
</html>
