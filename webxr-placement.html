<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>WebXR — Surface Placement</title>

    <!-- A-Frame 1.6.0 (WebXR) -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }

      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: calc(0.75rem + env(safe-area-inset-top))
          calc(1rem + env(safe-area-inset-right)) 0.75rem
          calc(1rem + env(safe-area-inset-left));
        background: rgba(0, 0, 0, 0.6);
        color: white;
      }

      .overlay a {
        color: white;
        text-decoration: none;
        font-size: 0.875rem;
        padding: 0.5rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 0.375rem;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
      }

      .overlay a:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .overlay h1 {
        font-size: 1rem;
        font-weight: 600;
        margin: 0;
        max-width: 60vw;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .instructions {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 10;
        padding: 1rem calc(1rem + env(safe-area-inset-right))
          calc(1rem + env(safe-area-inset-bottom))
          calc(1rem + env(safe-area-inset-left));
        background: rgba(0, 0, 0, 0.7);
        color: white;
        text-align: center;
        font-size: 0.875rem;
        line-height: 1.5;
      }

      .actions {
        display: flex;
        justify-content: center;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-top: 0.75rem;
      }

      .actions button {
        background: #111;
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 0.5rem;
        min-height: 44px;
        padding: 0.55rem 1.25rem;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        transition:
          transform 0.08s ease,
          filter 0.08s ease,
          box-shadow 0.08s ease;
      }

      .actions button:disabled {
        opacity: 0.55;
      }

      .actions button:active:not(:disabled) {
        transform: translateY(1px) scale(0.98);
        filter: brightness(1.1);
        box-shadow: 0 0 0 2px rgba(0, 212, 200, 0.3);
      }

      .actions button:focus-visible {
        outline: 2px solid #00d4c8;
        outline-offset: 2px;
      }

      .status {
        margin: 0.25rem 0 0;
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.8);
      }

      .status.bump {
        animation: status-bump 0.25s ease;
      }

      @keyframes status-bump {
        0% {
          transform: translateY(0);
          opacity: 0.7;
        }
        100% {
          transform: translateY(-2px);
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <!-- Navigation overlay -->
    <div id="ar-overlay">
      <div class="overlay" id="overlay">
        <a href="./">← Back</a>
        <h1>WebXR — Surface Placement</h1>
      </div>

      <!-- Instructions -->
      <div class="instructions">
        Aim at the floor and tap Place when the reticle appears. After placing, drag to move.
        <p class="status" id="status">Checking WebXR support...</p>
        <div class="actions">
          <button id="start-ar" type="button">Start AR</button>
          <button id="place-button" type="button" disabled>Place</button>
          <button id="reset-button" type="button" disabled>Reset</button>
        </div>
      </div>
    </div>

    <!-- WebXR A-Frame scene: surface placement using a virtual ground plane -->
    <a-scene
      embedded
      renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
      vr-mode-ui="enabled: false"
      webxr="requiredFeatures: hit-test; optionalFeatures: dom-overlay, local-floor; overlayElement: #ar-overlay;"
    >
      <a-assets>
        <a-asset-item
          id="magnemite-model"
          src="./models/pokemon_magnemite/scene.gltf"
        ></a-asset-item>
      </a-assets>

      <a-entity light="type: ambient; intensity: 0.7"></a-entity>
      <a-entity light="type: directional; intensity: 0.8" position="1 2 1">
      </a-entity>

      <a-entity
        id="reticle"
        geometry="primitive: ring; radiusInner: 0.08; radiusOuter: 0.12"
        material="color: #00d4c8; shader: flat; opacity: 0.9"
        rotation="-90 0 0"
        visible="false"
      ></a-entity>

      <a-gltf-model
        id="magnemite"
        src="#magnemite-model"
        position="0 0 -2"
        rotation="0 0 0"
        scale="0.01 0.01 0.01"
        play-gltf-animation="clip: Take 001"
        visible="false"
      ></a-gltf-model>

      <a-entity camera position="0 1.6 0"></a-entity>
    </a-scene>

    <script>
      if (!AFRAME.components["play-gltf-animation"]) {
        AFRAME.registerComponent("play-gltf-animation", {
          schema: {
            clip: { type: "string" },
          },
          init() {
            this.mixer = null;
            this.action = null;

            this.el.addEventListener("model-loaded", (event) => {
              const model = event.detail.model;
              const clips = event.detail.animations || [];
              if (!model || clips.length === 0) {
                return;
              }

              const clipName = this.data.clip;
              const clip =
                clips.find((item) => item.name === clipName) ?? clips[0];
              if (!clip) {
                return;
              }

              this.mixer = new AFRAME.THREE.AnimationMixer(model);
              this.action = this.mixer.clipAction(clip);
              this.action.play();
            });
          },
          tick(_, delta) {
            if (!this.mixer || !delta) {
              return;
            }

            this.mixer.update(delta / 1000);
          },
        });
      }

      if (!AFRAME.components["custom-hit-test"]) {
        AFRAME.registerComponent("custom-hit-test", {
        init() {
          this.reticle = document.getElementById("reticle");
          this.hitTestSource = null;
          this.referenceSpace = null;

          const renderer = this.el.sceneEl.renderer;
          if (!renderer || !renderer.xr) {
            return;
          }

          renderer.xr.addEventListener("sessionstart", () => {
            const session = renderer.xr.getSession();
            if (!session) {
              return;
            }

            session.requestReferenceSpace("viewer").then((viewerSpace) => {
              session
                .requestHitTestSource({ space: viewerSpace })
                .then((source) => {
                  this.hitTestSource = source;
                })
                .catch(() => {
                  this.hitTestSource = null;
                });
            });

            this.referenceSpace = renderer.xr.getReferenceSpace();
          });

          renderer.xr.addEventListener("sessionend", () => {
            this.hitTestSource = null;
            this.referenceSpace = null;
            if (this.reticle) {
              this.reticle.object3D.visible = false;
            }
          });
        },
        tick() {
          if (!this.reticle || !this.hitTestSource || !this.referenceSpace) {
            if (this.reticle) {
              this.reticle.object3D.visible = false;
            }
            return;
          }

          const frame = this.el.sceneEl.frame;
          if (!frame) {
            return;
          }

          const hitTestResults = frame.getHitTestResults(this.hitTestSource);
          if (hitTestResults.length === 0) {
            this.reticle.object3D.visible = false;
            return;
          }

          const hit = hitTestResults[0];
          const pose = hit.getPose(this.referenceSpace);
          if (!pose) {
            this.reticle.object3D.visible = false;
            return;
          }

          this.reticle.object3D.position.set(
            pose.transform.position.x,
            pose.transform.position.y,
            pose.transform.position.z,
          );
          this.reticle.object3D.visible = true;
        },
        });
      }

      window.addEventListener("load", () => {
        const sceneEl = document.querySelector("a-scene");
        const startButton = document.getElementById("start-ar");
        const placeButton = document.getElementById("place-button");
        const statusEl = document.getElementById("status");
        const reticle = document.getElementById("reticle");
        const modelEl = document.getElementById("magnemite");
        const resetButton = document.getElementById("reset-button");

        let isPlaced = false;
        let isDragging = false;
        let dragRafId = null;

        if (!sceneEl || !startButton || !placeButton || !statusEl) {
          return;
        }

        sceneEl.setAttribute("custom-hit-test", "");

        const updateStatus = (message) => {
          statusEl.textContent = message;
          statusEl.classList.remove("bump");
          void statusEl.offsetWidth;
          statusEl.classList.add("bump");
        };

        const vibrate = () => {
          if (navigator.vibrate) {
            navigator.vibrate(10);
          }
        };

        const setPlacementEnabled = (enabled) => {
          placeButton.disabled = !enabled;
        };

        if (!navigator.xr || !navigator.xr.isSessionSupported) {
          updateStatus("WebXR is not supported on this device.");
          startButton.disabled = true;
          return;
        }

        navigator.xr
          .isSessionSupported("immersive-ar")
          .then((supported) => {
            if (!supported) {
              updateStatus("WebXR immersive AR is not supported here.");
              startButton.disabled = true;
              return;
            }

            updateStatus("WebXR ready. Tap Start AR.");
          })
          .catch(() => {
            updateStatus("Unable to check WebXR support.");
            startButton.disabled = true;
          });

        const startArSession = () => {
          const enterPromise = sceneEl.enterAR
            ? sceneEl.enterAR()
            : sceneEl.enterVR(true);

          if (enterPromise && typeof enterPromise.catch === "function") {
            enterPromise.catch(() => {
              updateStatus("Unable to start AR session.");
            });
          }

          vibrate();
        };

        startButton.addEventListener("click", startArSession);

        sceneEl.addEventListener("enter-vr", () => {
          if (sceneEl.is("ar-mode")) {
            updateStatus("Move your device to find the floor.");
            setPlacementEnabled(true);
          }
        });

        sceneEl.addEventListener("exit-vr", () => {
          isPlaced = false;
          isDragging = false;
          if (dragRafId) {
            cancelAnimationFrame(dragRafId);
            dragRafId = null;
          }
          if (resetButton) resetButton.disabled = true;
          updateStatus("AR session ended.");
          setPlacementEnabled(false);
          if (modelEl) {
            modelEl.setAttribute("visible", "false");
          }
          if (reticle) {
            reticle.setAttribute("visible", "false");
          }
        });

        placeButton.addEventListener("click", () => {
          if (!reticle || !modelEl) return;
          if (!reticle.object3D.visible) {
            updateStatus("Reticle not found yet. Keep moving.");
            return;
          }

          modelEl.object3D.position.set(
            reticle.object3D.position.x,
            reticle.object3D.position.y + 0.15,
            reticle.object3D.position.z
          );
          modelEl.object3D.rotation.set(0, sceneEl.camera.rotation.y + Math.PI, 0);
          modelEl.setAttribute("visible", "true");
          isPlaced = true;
          if (resetButton) resetButton.disabled = false;
          updateStatus("Placed! Drag to move, or tap Place to reposition.");
          vibrate();
        });

        if (resetButton) {
          resetButton.addEventListener("click", () => {
            isPlaced = false;
            isDragging = false;
            if (dragRafId) {
              cancelAnimationFrame(dragRafId);
              dragRafId = null;
            }
            if (modelEl) modelEl.setAttribute("visible", "false");
            resetButton.disabled = true;
            updateStatus("Move your device to find the floor.");
            vibrate();
          });
        }

        function dragLoop() {
          if (!isDragging || !reticle || !modelEl) return;
          if (reticle.object3D.visible) {
            modelEl.object3D.position.set(
              reticle.object3D.position.x,
              reticle.object3D.position.y + 0.15,
              reticle.object3D.position.z
            );
          }
          dragRafId = requestAnimationFrame(dragLoop);
        }

        document.addEventListener("pointerdown", (e) => {
          if (e.target.tagName === "BUTTON" || e.target.tagName === "A") return;
          if (!isPlaced || !modelEl || !modelEl.object3D.visible) return;
          isDragging = true;
          updateStatus("Dragging...");
          dragLoop();
        });

        document.addEventListener("pointerup", () => {
          if (!isDragging) return;
          isDragging = false;
          if (dragRafId) {
            cancelAnimationFrame(dragRafId);
            dragRafId = null;
          }
          updateStatus("Placed! Drag to move, or tap Place to reposition.");
        });
      });
    </script>
  </body>
</html>
