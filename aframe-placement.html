<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>A-Frame — Markerless Placement</title>

    <!-- A-Frame 1.6.0 -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        background: black;
      }

      #camera-feed {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: 0;
        background: black;
      }

      a-scene {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
      }

      .a-canvas {
        width: 100% !important;
        height: 100% !important;
      }

      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: calc(0.75rem + env(safe-area-inset-top))
          calc(1rem + env(safe-area-inset-right)) 0.75rem
          calc(1rem + env(safe-area-inset-left));
        background: rgba(0, 0, 0, 0.6);
        color: white;
      }

      .overlay a {
        color: white;
        text-decoration: none;
        font-size: 0.875rem;
        padding: 0.5rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 0.375rem;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
      }

      .overlay a:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .overlay h1 {
        font-size: 1rem;
        font-weight: 600;
        margin: 0;
        max-width: 60vw;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .instructions {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 10;
        padding: 1rem calc(1rem + env(safe-area-inset-right))
          calc(1rem + env(safe-area-inset-bottom))
          calc(1rem + env(safe-area-inset-left));
        background: rgba(0, 0, 0, 0.7);
        color: white;
        text-align: center;
        font-size: 0.875rem;
        line-height: 1.5;
      }

      .actions {
        display: flex;
        justify-content: center;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-top: 0.75rem;
      }

      .actions button {
        background: #111;
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 0.5rem;
        min-height: 44px;
        padding: 0.55rem 1.25rem;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        transition:
          transform 0.08s ease,
          filter 0.08s ease,
          box-shadow 0.08s ease;
      }

      .actions button:disabled {
        opacity: 0.55;
      }

      .actions button:active:not(:disabled) {
        transform: translateY(1px) scale(0.98);
        filter: brightness(1.1);
        box-shadow: 0 0 0 2px rgba(0, 212, 200, 0.3);
      }

      .actions button:focus-visible {
        outline: 2px solid #00d4c8;
        outline-offset: 2px;
      }

      .status {
        margin: 0.25rem 0 0;
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.8);
      }

      .status.bump {
        animation: status-bump 0.25s ease;
      }

      @keyframes status-bump {
        0% {
          transform: translateY(0);
          opacity: 0.7;
        }
        100% {
          transform: translateY(-2px);
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <!-- Navigation overlay -->
    <div class="overlay" id="overlay">
      <a href="./">← Back</a>
      <h1>A-Frame — Markerless Placement</h1>
    </div>

    <!-- Instructions -->
    <div class="instructions">
      Tap Place to drop Magnemite in front of you. Drag on the scene to rotate
      the model. This uses a camera video background with a 3D overlay, so
      placement is relative to the camera. Requires HTTPS or localhost.
      <p class="status" id="status">Requesting camera access...</p>
      <div class="actions">
        <button id="place-button" type="button" disabled>Place</button>
        <button id="reset-button" type="button" disabled>Reset</button>
      </div>
    </div>

    <video id="camera-feed" autoplay muted playsinline></video>

    <!-- A-Frame scene: markerless camera placement -->
    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      renderer="colorManagement: true; alpha: true;"
    >
      <a-assets>
        <a-asset-item
          id="magnemite-model"
          src="./models/pokemon_magnemite/scene.gltf"
        ></a-asset-item>
      </a-assets>

      <a-gltf-model
        id="magnemite"
        src="#magnemite-model"
        position="0 -0.5 -2"
        rotation="0 0 0"
        scale="0.05 0.05 0.05"
        play-gltf-animation="clip: Take 001"
        visible="false"
      ></a-gltf-model>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      if (!AFRAME.components["play-gltf-animation"]) {
        AFRAME.registerComponent("play-gltf-animation", {
          schema: {
            clip: { type: "string" },
          },
          init() {
            this.mixer = null;
            this.action = null;

            this.el.addEventListener("model-loaded", (event) => {
              const model = event.detail.model;
              const clips = event.detail.animations || [];
              if (!model || clips.length === 0) {
                return;
              }

              const clipName = this.data.clip;
              const clip =
                clips.find((item) => item.name === clipName) ?? clips[0];
              if (!clip) {
                return;
              }

              this.mixer = new AFRAME.THREE.AnimationMixer(model);
              this.action = this.mixer.clipAction(clip);
              this.action.play();
            });
          },
          tick(_, delta) {
            if (!this.mixer || !delta) {
              return;
            }

            this.mixer.update(delta / 1000);
          },
        });
      }

      window.addEventListener("load", () => {
        const statusEl = document.getElementById("status");
        const videoEl = document.getElementById("camera-feed");
        const sceneEl = document.querySelector("a-scene");
        const placeButton = document.getElementById("place-button");
        const resetButton = document.getElementById("reset-button");
        const modelEl = document.getElementById("magnemite");
        const cameraEl = document.querySelector("[camera]");

        if (
          !statusEl ||
          !videoEl ||
          !sceneEl ||
          !placeButton ||
          !resetButton ||
          !modelEl ||
          !cameraEl
        ) {
          return;
        }

        let cameraReady = false;
        let modelReady = false;

        const vibrate = () => {
          if (navigator.vibrate) {
            navigator.vibrate(10);
          }
        };

        const bumpStatus = () => {
          statusEl.classList.remove("bump");
          void statusEl.offsetWidth;
          statusEl.classList.add("bump");
        };

        const setControlsEnabled = (enabled) => {
          placeButton.disabled = !enabled;
          resetButton.disabled = !enabled;
        };

        const updateStatus = (message) => {
          statusEl.textContent = message;
          bumpStatus();
        };

        const syncControls = () => {
          setControlsEnabled(cameraReady && modelReady);
        };

        const startCamera = async () => {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: "environment" },
              audio: false,
            });

            videoEl.srcObject = stream;
            await videoEl.play();
            cameraReady = true;
            updateStatus("Camera ready. Loading model...");
            syncControls();

            if (sceneEl.renderer) {
              sceneEl.renderer.setClearColor(0x000000, 0);
            } else {
              sceneEl.addEventListener("loaded", () => {
                if (sceneEl.renderer) {
                  sceneEl.renderer.setClearColor(0x000000, 0);
                }
              });
            }
          } catch (error) {
            updateStatus("Unable to access the camera.");
            setControlsEnabled(false);
          }
        };

        const placeModel = () => {
          const cameraObject = sceneEl.camera;
          if (!cameraObject) {
            updateStatus("Camera not ready yet.");
            return;
          }
          const direction = new AFRAME.THREE.Vector3();
          const position = new AFRAME.THREE.Vector3();

          cameraObject.getWorldDirection(direction);
          cameraObject.getWorldPosition(position);

          direction.multiplyScalar(2.5);
          position.add(direction);
          position.y -= 0.5;

          modelEl.object3D.position.copy(position);
          modelEl.object3D.rotation.set(0, cameraObject.rotation.y + Math.PI, 0);
          modelEl.setAttribute("visible", "true");
          updateStatus("Placed. Tap Place to reposition.");
          vibrate();
        };

        const resetModel = () => {
          modelEl.setAttribute("visible", "false");
          updateStatus("Placement reset.");
          vibrate();
        };

        const enableRotationControls = () => {
          const canvas = sceneEl.canvas;
          if (!canvas) {
            return;
          }

          canvas.style.touchAction = "none";

          let isDragging = false;
          let lastX = 0;

          const onPointerDown = (event) => {
            if (modelEl.getAttribute("visible") !== true) {
              return;
            }

            isDragging = true;
            lastX = event.clientX;
          };

          const onPointerMove = (event) => {
            if (!isDragging) {
              return;
            }

            const deltaX = event.clientX - lastX;
            lastX = event.clientX;
            modelEl.object3D.rotation.y -= deltaX * 0.01;
          };

          const onPointerUp = () => {
            isDragging = false;
          };

          canvas.addEventListener("pointerdown", onPointerDown);
          canvas.addEventListener("pointermove", onPointerMove);
          canvas.addEventListener("pointerup", onPointerUp);
          canvas.addEventListener("pointerleave", onPointerUp);
          canvas.addEventListener("pointercancel", onPointerUp);
        };

        modelEl.addEventListener("model-loaded", () => {
          modelReady = true;
          updateStatus("Model ready. Tap Place.");
          syncControls();
        });

        modelEl.addEventListener("model-error", () => {
          updateStatus("Model failed to load.");
          syncControls();
        });

        placeButton.addEventListener("click", placeModel);
        resetButton.addEventListener("click", resetModel);

        setControlsEnabled(false);
        if (sceneEl.hasLoaded) {
          enableRotationControls();
        } else {
          sceneEl.addEventListener("loaded", enableRotationControls, {
            once: true,
          });
        }
        startCamera();
      });
    </script>
  </body>
</html>
